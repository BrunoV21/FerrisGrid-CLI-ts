name: Bug report
description: Report a TypeScript npm package bug, packaging problem, or Rust behavior mismatch.
title: "Bug: "
labels:
  - bug
body:
  - type: markdown
    attributes:
      value: |
        Thanks for reporting a FerrisGrid TypeScript package bug. Use this repository for npm packaging issues, TypeScript implementation failures, and mismatches with the Rust CLI behavior.

        Feature requests and protocol changes belong in the canonical Rust repository: https://github.com/BrunoV21/FerrisGrid-CLI/issues/new?template=feature_request.yml
  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: What happened?
    validations:
      required: true
  - type: textarea
    id: reproduce
    attributes:
      label: Steps to reproduce
      description: Commands, action files, install method, or setup steps that trigger the issue.
      placeholder: |
        1. Run `npm install -g ferrisgrid-cli`
        2. Run `ferrisgrid doctor`
        3. Run `ferrisgrid observe --backend fake`
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
      description: Paste relevant output, logs, or error text.
    validations:
      required: true
  - type: input
    id: version
    attributes:
      label: FerrisGrid npm package version
      placeholder: "ferrisgrid --version or npm list -g ferrisgrid-cli"
  - type: input
    id: node
    attributes:
      label: Node.js and npm versions
      placeholder: "node --version; npm --version"
  - type: dropdown
    id: os
    attributes:
      label: Operating system
      options:
        - macOS
        - Linux
        - Windows
        - Docker Linux workspace
        - Other
    validations:
      required: true
  - type: dropdown
    id: area
    attributes:
      label: Area
      options:
        - npm install or package metadata
        - CLI help or argument parsing
        - observe
        - act
        - doctor
        - recap
        - clear
        - Rust fallback
        - Behavior mismatch with Rust CLI
        - Other
    validations:
      required: true
  - type: textarea
    id: context
    attributes:
      label: Additional context
      description: Screenshots, environment variables, backend selection, permissions, or Rust CLI comparison output.
